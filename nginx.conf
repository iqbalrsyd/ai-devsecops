events {}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;

    upstream ai_upstream {
        server ai-service:8000;
    }

    upstream backend_upstream {
        server backend:8080;
    }

    upstream frontend_upstream {
        server frontend:5173;
    }

    server {
        listen 80;

        location /api/v1/ai/ {
            rewrite ^/api/v1/ai/(.*) /api/$1 break;
            proxy_pass http://ai_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            # CORS headers — FastAPI's CORSMiddleware is bypassed when
            # requests are proxied through nginx, so we add them here.
            set $cors_origin $http_origin;
            if ($cors_origin = "") { set $cors_origin "*"; }
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age "3600" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        location /ai/ {
            rewrite ^/ai/(.*) /api/$1 break;
            proxy_pass http://ai_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
