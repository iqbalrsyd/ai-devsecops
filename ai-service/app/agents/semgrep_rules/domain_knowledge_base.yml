# Domain Knowledge Base for AI Agent (Tier 3 Rule Generation).
# Read this file BEFORE generating custom Semgrep rules.
# Format kept minimal — AI agent should expand into full rule syntax.
#
# Convention:
#   - CWE format: "CWE-XXX: Title"
#   - Rule id prefix: <domain>-custom-<slug> (matches llm_generation_config)
#   - Severity: AI must emit INFO or WARNING only
#
# Reference: app/agents/semgrep_rules/llm_generation_config.py

version: "1.0"
purpose: "Knowledge base for AI agent generating Tier 3 Semgrep rules per detected domain."
usage: "Lookup detected domain → read cwe_focus + threats + rule_outlines → expand into full Semgrep YAML."

domains:

  e-commerce:
    cwe_focus:
      - "CWE-79: Cross-site Scripting"
      - "CWE-89: SQL Injection"
      - "CWE-352: Cross-Site Request Forgery"
      - "CWE-434: Unrestricted Upload of File with Dangerous Type"
      - "CWE-602: Client-Side Enforcement of Server-Side Security"
      - "CWE-639: Authorization Bypass Through User-Controlled Key"
      - "CWE-915: Improperly Controlled Modification of Dynamically-Determined Object Attributes"
      - "CWE-532: Insertion of Sensitive Information into Log File"
      - "CWE-798: Use of Hard-coded Credentials"
      - "CWE-312: Cleartext Storage of Sensitive Information"
      - "CWE-319: Cleartext Transmission of Sensitive Information"
      - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
    threats:
      - "SQLi di checkout/order lookup"
      - "CSRF di payment/checkout endpoint"
      - "BOLA cart/order (IDOR)"
      - "Price/quantity/discount tampering dari request body"
      - "Mass assignment (req.body spread) → privilege escalation"
      - "PAN/CVV/stripe key di logs atau source"  
    rule_outlines:
      - id_skeleton: "ecommerce-custom-...-sqli-cart-lookup"
        hint: "db.query(\"...'$X'...\") atau template literal di order/product query"
      - id_skeleton: "ecommerce-custom-...-price-from-body"
        hint: "$PRICE = req.body.price tanpa server-side validation"
      - id_skeleton: "ecommerce-custom-...-mass-assign-order"
        hint: "Order.create({...req.body}) atau User.update(req.body) tanpa whitelist"
      - id_skeleton: "ecommerce-custom-...-card-data-log"
        hint: "console.log/logger.info(...cardNumber/cvv/cvc...)"
      - id_skeleton: "ecommerce-custom-...-jwt-no-expiry-domain"
        hint: "jwt.sign(payload, secret) tanpa expiresIn option"
    frameworks: ["stripe", "midtrans", "xendit", "doku", "paypal", "braintree", "razorpay", "adyen", "square", "shopify"]
    skip_for: ["kubernetes", "istio", "service-mesh"]

  healthcare:
    cwe_focus:
      - "CWE-532: Insertion of Sensitive Information into Log File"
      - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      - "CWE-319: Cleartext Transmission of Sensitive Information"
      - "CWE-639: Authorization Bypass Through User-Controlled Key"
      - "CWE-778: Insufficient Logging"
      - "CWE-798: Use of Hard-coded Credentials"
      - "CWE-613: Insufficient Session Expiration"
      - "CWE-916: Use of Password Hash With Insufficient Computational Effort"
    threats:
      - "PHI (patient name, MRN, NIK, diagnosis) di log output"
      - "Weak/deprecated cipher untuk PHI (createCipher tanpa IV)"
      - "PHI transmission over HTTP"
      - "FHIR resource return tanpa consent/ownership check"
      - "PHI access tanpa audit log"
      - "Session tanpa expiry (auto-logoff requirement)"
    rule_outlines:
      - id_skeleton: "healthcare-custom-...-phi-in-log"
        hint: "console.log/logger.info(...patientName/MRN/diagnosis/SSN...) tanpa redactor"
      - id_skeleton: "healthcare-custom-...-weak-cipher-phi"
        hint: "crypto.createCipher(algo, key) atau createCipheriv tanpa random IV"
      - id_skeleton: "healthcare-custom-...-fhir-bola"
        hint: "res.json(fhirPatient) atau return fhirPatient tanpa consent check"
      - id_skeleton: "healthcare-custom-...-no-audit-phi"
        hint: "app.get('/patients/:id', handler) tanpa audit log call"
      - id_skeleton: "healthcare-custom-...-weak-bcrypt-rounds-phi"
        hint: "bcrypt.hash(pw, < 10) atau MD5/SHA1 untuk password PHI"
    frameworks: ["fhir", "hapi-fhir", "hl7", "dicom", "epic", "cerner", "smart-on-fhir"]
    skip_for: ["command-injection"]

  fintech:
    cwe_focus:
      - "CWE-362: Concurrent Execution using Shared Resource"
      - "CWE-20: Improper Input Validation"
      - "CWE-294: Authentication Bypass by Capture-Replay"
      - "CWE-778: Insufficient Logging"
      - "CWE-682: Incorrect Calculation"
      - "CWE-285: Improper Authorization"
    threats:
      - "Non-atomic balance update (double-spend / race condition)"
      - "Withdrawal tanpa balance check"
      - "Transfer tanpa idempotency key (replay attack)"
      - "Financial transaction tanpa audit log"
      - "One-sided ledger entry (debit tanpa credit)"
      - "KYC bypass untuk transaksi nilai besar"
    rule_outlines:
      - id_skeleton: "fintech-custom-...-non-atomic-balance"
        hint: "balance -= amount; account.save() tanpa transaction/row lock"
      - id_skeleton: "fintech-custom-...-no-replay-key"
        hint: "$app.post('/transfer', handler) tanpa idempotency middleware"
      - id_skeleton: "fintech-custom-...-ledger-one-sided"
        hint: "from.balance -= amount tanpa corresponding to.balance += amount"
      - id_skeleton: "fintech-custom-...-kyc-bypass-amount"
        hint: "if amount > 10000: transfer() tanpa kyc_status check"
      - id_skeleton: "fintech-custom-...-no-audit-trail"
        hint: "endpoint /transfer/withdraw/deposit tanpa logger.info call"
    frameworks: ["plaid", "open-banking", "dwolla", "coinbase", "alpaca", "ibkr"]
    skip_for: []

  blog:
    cwe_focus:
      - "CWE-1021: Improper Restriction of Rendered UI Layers"
      - "CWE-79: Cross-site Scripting"
      - "CWE-601: URL Redirection to Untrusted Site"
      - "CWE-434: Unrestricted Upload of File with Dangerous Type"
    threats:
      - "Missing Content-Security-Policy header"
      - "XSS via innerHTML/dangerouslySetInnerHTML di comment/post"
      - "Open redirect (res.redirect(req.query.next))"
      - "File upload tanpa ext/MIME validation (web shell)"
      - "Markdown rendering tanpa sanitization (javascript: link, onerror img)"
    rule_outlines:
      - id_skeleton: "blog-custom-...-innerHTML-comment"
        hint: "el.innerHTML = req.body.comment/post tanpa DOMPurify"
      - id_skeleton: "blog-custom-...-markdown-no-sanitize"
        hint: "marked(content) atau marked.parse(comment) tanpa DOMPurify.sanitize"
      - id_skeleton: "blog-custom-...-open-redirect-next"
        hint: "res.redirect(req.query.next|url|body.redirect_to)"
      - id_skeleton: "blog-custom-...-upload-no-ext-check"
        hint: "req.files.image.mv(path) tanpa path.extname in allowed check"
      - id_skeleton: "blog-custom-...-csp-header-missing"
        hint: "route handler tanpa helmet() atau res.setHeader('Content-Security-Policy', ...)"
    frameworks: ["marked", "markdown-it", "showdown", "dompurify", "sanitize-html", "ghost", "hexo", "jekyll"]
    skip_for: ["idor", "ssrf", "jwt", "rate-limiting"]

  iot:
    cwe_focus:
      - "CWE-319: Cleartext Transmission of Sensitive Information"
      - "CWE-798: Use of Hard-coded Credentials"
      - "CWE-295: Improper Certificate Validation"
      - "CWE-22: Path Traversal"
      - "CWE-311: Missing Encryption of Sensitive Data"
      - "CWE-287: Improper Authentication"
      - "CWE-668: Exposure of Resource to Wrong Sphere"
      - "CWE-494: Download of Code Without Integrity Check"
    threats:
      - "MQTT broker connection over cleartext (mqtt://)"
      - "Default MQTT credentials (admin/admin, device/1234)"
      - "TLS dengan cert verification disabled (MITM risk)"
      - "Firmware path traversal (user-controlled file path)"
      - "Telemetry data tanpa encryption"
      - "Device auth bypass (device_id sebagai satu-satunya credential)"
      - "MQTT broker exposed di 0.0.0.0:1883"
      - "Firmware update over HTTP tanpa signature check"
    rule_outlines:
      - id_skeleton: "iot-custom-...-mqtt-cleartext"
        hint: "client.connect('mqtt://...') atau mqtt.Client().connect('mqtt://...')"
      - id_skeleton: "iot-custom-...-default-mqtt-creds"
        hint: "string literal 'admin:admin' / 'device:1234' di code"
      - id_skeleton: "iot-custom-...-firmware-path-traversal"
        hint: "open(req.query.firmware) atau send_file(req.args.get('firmware')) tanpa allowlist"
      - id_skeleton: "iot-custom-...-tls-no-verify"
        hint: "client.tls_insecure_set(True) atau cert_reqs=ssl.CERT_NONE"
      - id_skeleton: "iot-custom-...-firmware-http-download"
        hint: "requests.get('http://.../firmware/...') atau fetch('http://...update.bin')"
    frameworks: ["mqtt", "paho-mqtt", "amqp", "coap", "modbus", "azure-iot", "aws-iot"]
    skip_for: []

  education:
    cwe_focus:
      - "CWE-639: Authorization Bypass Through User-Controlled Key"
      - "CWE-285: Improper Authorization"
      - "CWE-200: Exposure of Sensitive Information"
      - "CWE-352: Cross-Site Request Forgery"
      - "CWE-613: Insufficient Session Expiration"
      - "CWE-915: Improperly Controlled Modification of Dynamically-Determined Object Attributes"
    threats:
      - "Student PII di logs"
      - "BOLA submission (satu student akses submission student lain)"
      - "Grade tampering dari request body"
      - "Quiz endpoint tanpa auth (cheating bypass)"
      - "Enrollment endpoint tanpa auth"
      - "Mass assignment (Student.update(req.body) → ubah role/enrollment status)"
    rule_outlines:
      - id_skeleton: "education-custom-...-bola-submission"
        hint: "route '/submissions/:id' atau '/grades/:id' tanpa ownership check"
      - id_skeleton: "education-custom-...-grade-tampering"
        hint: "grade = req.body.grade atau score = req.body.score tanpa server validation"
      - id_skeleton: "education-custom-...-no-auth-quiz"
        hint: "app.post('/api/quiz/submit', handler) tanpa authRequired middleware"
      - id_skeleton: "education-custom-...-student-pii-log"
        hint: "console.log/logger.info(...studentName/NIS/email...)"
      - id_skeleton: "education-custom-...-enrollment-no-auth"
        hint: "app.post('/enroll', handler) atau app.post('/api/enrollments', handler) tanpa auth"
    frameworks: ["moodle-sdk", "scorm", "canvas-lms", "blackboard", "edmodo", "edx", "sakai"]
    skip_for: ["ssrf", "rate-limiting"]

