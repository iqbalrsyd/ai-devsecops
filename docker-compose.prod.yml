services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_devsecops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: ai_devsecops
      DATABASE_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      JWT_SECRET: change-me-in-production-jangan-lupa-ganti
      JWT_ACCESS_DURATION: 1h
      JWT_REFRESH_DURATION: 168h
      ENCRYPTION_KEY: change-me-in-production-32byte-hex
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ALLOWED_ORIGINS: https://app.iqbalhidayatrasyad.blog
    expose:
      - "8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

  ai-service:
    build:
      context: ./ai-service
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      APP_NAME: AI DevSecOps Security Assistant
      DEBUG: "false"
      BACKEND_API_URL: http://backend:8080/api/v1
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_devsecops
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: opencode
      LLM_MODEL: minimax-m3
      OPENCODE_API_KEY: ""
      OPENCODE_BASE_URL: https://opencode.ai/zen/go/v1
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      OPENROUTER_API_KEY: ""
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      LLM_REQUEST_TIMEOUT: "120"
      GITHUB_TOKEN: ""
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod-nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/app.iqbalhidayatrasyad.blog:/etc/letsencrypt/live/app.iqbalhidayatrasyad.blog:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
      - ai-service
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
