services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_devsecops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - "5432"
    restart: unless-stopped
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      REDIS_HOST: redis
    expose:
      - "8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet

  ai-service:
    build:
      context: ./ai-service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_devsecops
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod-nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/app.iqbalhidayatrasyad.blog:/etc/letsencrypt/live/app.iqbalhidayatrasyad.blog:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
      - ai-service
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:
